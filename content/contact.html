<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #f4f4f4;
            color: #333;
        }

        /* Header Section */
        header {
            background-color: #009688; /* Same color as the Hero Section */
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 3rem;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.1rem;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* Contact Section Styling */
        .contact {
            padding: 40px;
            margin: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .contact h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #009688; /* Matching the header color */
        }

        .contact p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            font-size: 1.1rem;
            display: block;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group button {
            background-color: #009688;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .form-group button:hover {
            background-color: #00796b;
        }

        /* Footer Section */
        footer {
            background-color: #009688; /* Matching header/footer color */
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }

        footer a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>My Awesome Website</h1>
        <nav>
            <a href="/index.html">Home</a> <!-- Link to index.html in the root directory -->
            <a href="about.html">About</a> <!-- Link to about.html in the root directory -->
            <a href="services.html">Services</a> <!-- Link to services.html in the root directory -->
            <a href="contact.html">Contact</a> <!-- Link to contact.html in the root directory -->
        </nav>
    </header>

    <!-- Contact Section -->
    <section class="contact">
        <h2>Contact Us</h2>
        <p>If you have any questions or want to reach out, feel free to fill in the form below. We'll get back to you as soon as possible!</p>

        <form action="mailto:chanchalt@synapseco.com" method="POST" enctype="text/plain">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
            </div>

            <div class="form-group">
                <button type="submit">Send Message</button>
            </div>
        </form>
    </section>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2026 My Awesome Website</p>
        <p>
            <a href="privacy.html">Privacy Policy</a> | <a href="terms.html">Terms of Service</a>
        </p>
    </footer>

</body>
</html>
